<!DOCTYPE html>
<html lang="en" x-data="{ 
    darkMode: localStorage.getItem('theme') === 'dark', 
    isRtl: false,
    step: 1,
    selectedDive: null,
    diveDate: '',
    guests: 1,
    experiences: [
        {id: 1, name: 'Coral Garden', level: 'Beginner', price: 85, icon: '🪸', desc: 'Shallow reefs & vibrant fish.'},
        {id: 2, name: 'Odyssey Wreck', level: 'Advanced', price: 120, icon: '🚢', desc: 'Historic 40m deep wreckage.'},
        {id: 3, name: 'Night Mantas', level: 'Intermediate', price: 95, icon: '🌙', desc: 'Glow-in-the-dark marine life.'},
        {id: 4, name: 'Abyss Wall', level: 'Technical', price: 180, icon: '🔱', desc: 'Sheer drop-offs & big pelagics.'}
    ],
    toggleTheme() { 
        this.darkMode = !this.darkMode; 
        localStorage.setItem('theme', this.darkMode ? 'dark' : 'light'); 
    },
    toggleDir() { 
        this.isRtl = !this.isRtl; 
        document.documentElement.dir = this.isRtl ? 'rtl' : 'ltr'; 
    },
    get totalPrice() { return this.selectedDive ? this.selectedDive.price * this.guests : 0 }
}" :class="{'dark': darkMode}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="Assets/scuba.png">

    <title>Deep Dive | Booking Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { ocean: { 500: '#0ea5e9' } } } } }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        /* Ensuring layout transitions are smooth */
        body { transition: background-color 0.5s, color 0.5s; }
    </style>
</head>
<body class="font-sans min-h-screen overflow-x-hidden" :class="darkMode ? 'bg-slate-950 text-white' : 'bg-slate-50 text-slate-900'">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 glass border-b dark:border-slate-800" 
     x-data="{ 
        activeTab: sessionStorage.getItem('activeNav') || 'Home',
        profileDropdown: false,
        mobileDashOpen: false,
        setActive(name) {
            this.activeTab = name;
            sessionStorage.setItem('activeNav', name);
        }
     }">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-20 items-center">
            
            <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer group">
                <div class="w-10 h-10 bg-ocean-500 rounded-lg flex items-center justify-center text-white shadow-lg group-hover:rotate-12 transition-transform">
                    <a href="index.html" @click="setActive('Home')">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                        </svg>
                    </a>
                </div>
                <span class="text-2xl font-black tracking-tighter bg-gradient-to-r from-blue-600 to-ocean-400 bg-clip-text text-transparent uppercase italic">
                    DeepBlue
                </span>
            </div>

            <div class="hidden lg:flex items-center space-x-1 rtl:space-x-reverse">
                <template x-for="link in [
                    { name: 'Home', url: 'index.html' }, 
                    { name: 'Home2', url: 'home2.html' }, 
                    { name: 'Courses', url: 'course.html' }, 
                    { name: 'Instructors', url: 'instructors.html' }, 
                    { name: 'Resources', url: 'about.html' },
                    { name: 'Contact us', url: 'contact.html' }
                ]">
                    <a :href="link.url" 
                       @click="setActive(link.name)"
                       :class="activeTab === link.name ? 'text-ocean-500 bg-ocean-50 dark:bg-ocean-900/20' : 'text-slate-600 dark:text-slate-300 hover:text-ocean-500 hover:bg-ocean-50 dark:hover:bg-slate-800'"
                       class="px-4 py-2 rounded-xl font-bold text-sm transition-all duration-200" 
                       x-text="link.name"></a>
                </template>

                <div class="relative" @click.away="profileDropdown = false">
                    <button @click="profileDropdown = !profileDropdown"
                            :class="activeTab === 'Dashboard' ? 'text-ocean-500 bg-ocean-50 dark:bg-ocean-900/20' : 'text-slate-600 dark:text-slate-300'"
                            class="flex items-center gap-1 px-4 py-2 rounded-xl font-bold text-sm hover:text-ocean-500 transition-all">
                        Dashboard
                        <svg class="w-4 h-4 transition-transform" :class="profileDropdown ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div x-show="profileDropdown" x-cloak x-transition class="absolute right-0 mt-2 w-48 bg-white dark:bg-slate-800 rounded-xl shadow-xl border dark:border-slate-700 py-2 z-50">
                        <a href="user.html" @click="setActive('Dashboard')" class="flex items-center gap-2 px-4 py-2 hover:bg-ocean-50 dark:hover:bg-slate-700 text-sm font-bold">
                            👤 User Panel
                        </a>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-1.5 sm:gap-4">
                
                <button @click="toggleDir()" 
                        class="flex items-center justify-center min-w-[42px] text-[9px] font-black border-2 border-slate-200 dark:border-slate-700 px-2 py-1.5 rounded-lg uppercase hover:bg-ocean-500 hover:text-white transition-all active:scale-90">
                    <span x-text="isRtl ? 'LTR' : 'RTL'"></span>
                </button>

                <button @click="toggleTheme()" 
                        class="p-2.5 rounded-xl border-2 border-transparent bg-slate-100 dark:bg-slate-800 hover:bg-ocean-500 hover:text-white transition-all active:scale-90">
                    <span x-show="!darkMode" x-cloak>🌙</span>
                    <span x-show="darkMode" x-cloak>☀️</span>
                </button>

                <a href="login.html" class="hidden sm:block bg-ocean-500 text-white px-6 py-2.5 rounded-xl font-bold text-sm hover:shadow-lg transition-all">Login</a>
                
                <button @click="mobileMenu = !mobileMenu" class="lg:hidden p-2 text-slate-600 dark:text-slate-300">
                    <svg x-show="!mobileMenu" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    <svg x-show="mobileMenu" x-cloak class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <div x-show="mobileMenu" 
         x-cloak
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 -translate-y-10"
         x-transition:enter-end="opacity-100 translate-y-0"
         class="lg:hidden fixed inset-x-0 top-20 bg-white dark:bg-slate-900 border-b dark:border-slate-800 shadow-2xl z-[200] glass">
        
        <div class="px-6 pt-4 pb-10 space-y-2 max-h-[80vh] overflow-y-auto">
            <template x-for="link in [
                {n: 'Home', u: 'index.html'}, 
                {n: 'Home2', u: 'home2.html'}, 
                {n: 'Courses', u: 'course.html'}, 
                {n: 'Instructors', u: 'instructors.html'}, 
                {n: 'Resources', u: 'about.html'},
                {n: 'Contact us', u: 'contact.html'}
            ]">
                <a :href="link.u" 
                   @click="setActive(link.n)"
                   :class="activeTab === link.n ? 'text-ocean-500 bg-ocean-50 dark:bg-ocean-900/20 font-black' : 'text-slate-600 dark:text-slate-300 font-bold'"
                   class="block px-4 py-4 rounded-2xl hover:bg-ocean-50 transition-all uppercase text-xs tracking-widest">
                    <span x-text="link.n"></span>
                </a>
            </template>

            <div class="rounded-2xl border dark:border-slate-800">
                <button @click="mobileDashOpen = !mobileDashOpen" 
                        :class="activeTab === 'Dashboard' ? 'text-ocean-500' : ''"
                        class="w-full flex justify-between items-center px-4 py-4 font-black uppercase text-xs tracking-widest">
                    Dashboard Suite
                    <svg class="w-4 h-4 transition-transform" :class="mobileDashOpen ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div x-show="mobileDashOpen" x-transition class="px-4 pb-4 space-y-2">
                    <a href="user.html" @click="setActive('Dashboard')" class="block p-4 rounded-xl bg-slate-50 dark:bg-white/5 text-[10px] font-black uppercase tracking-widest">📊 Diver Panel</a>
                </div>
            </div>

            <div class="pt-6 mt-4 border-t dark:border-slate-800 text-center">
                <a href="login.html" class="block w-full bg-ocean-500 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg">Enter Terminal</a>
            </div>
        </div>
    </div>
</nav>

    <main class="pt-24 md:pt-32 pb-32 px-4 md:px-6 max-w-6xl mx-auto">
        
        <div class="max-w-xs md:max-w-md mx-auto mb-10 md:mb-16">
            <div class="flex justify-between relative">
                <div class="absolute h-1 bg-slate-200 dark:bg-slate-800 w-full top-1/2 -translate-y-1/2 z-0"></div>
                <div class="absolute h-1 bg-ocean-500 transition-all duration-700 top-1/2 -translate-y-1/2 z-0" 
                     :class="isRtl ? 'right-0' : 'left-0'"
                     :style="`width: ${(step-1)*50}%` "></div>
                
                <template x-for="i in [1, 2, 3]">
                    <div class="relative z-10 w-8 h-8 md:w-12 md:h-12 rounded-full flex items-center justify-center font-black transition-all"
                         :class="step >= i ? 'bg-ocean-500 text-white shadow-lg shadow-ocean-500/30 scale-110' : 'bg-slate-200 dark:bg-slate-800 text-slate-400'">
                        <span class="text-xs md:text-base" x-text="i"></span>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="step === 1" x-transition:enter="transition duration-500 opacity-0 scale-95">
            <div class="text-center mb-10">
                <h2 class="text-3xl md:text-5xl font-black tracking-tighter mb-3">Select <span class="text-ocean-500">Adventure</span></h2>
                <p class="text-sm md:text-lg opacity-60">Pick your depth and discover the unknown.</p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                <template x-for="dive in experiences" :key="dive.id">
                    <div @click="selectedDive = dive; step = 2" 
                         class="p-6 md:p-8 rounded-[2.5rem] cursor-pointer border-2 transition-all hover:-translate-y-2 active:scale-95 group"
                         :class="selectedDive?.id === dive.id ? 'border-ocean-500 bg-ocean-500/5' : 'border-black/5 dark:border-white/5 bg-white dark:bg-slate-900 text-left'"
                         :style="isRtl ? 'text-align: right;' : 'text-align: left;'">
                        <div class="flex justify-between items-start mb-6" :class="isRtl ? 'flex-row-reverse' : ''">
                            <span class="text-4xl md:text-5xl group-hover:scale-110 transition-transform" x-text="dive.icon"></span>
                            <span class="text-sm font-black text-ocean-500" x-text="'$' + dive.price"></span>
                        </div>
                        <h3 class="text-xl font-black mb-1" x-text="dive.name"></h3>
                        <p class="text-[10px] font-black uppercase tracking-widest text-ocean-500/60 mb-3" x-text="dive.level"></p>
                        <p class="text-xs leading-relaxed opacity-50" x-text="dive.desc"></p>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="step === 2" x-transition:enter="transition duration-500 opacity-0 translate-y-4" class="max-w-2xl mx-auto">
            <div class="bg-white dark:bg-slate-900 rounded-[3rem] p-6 md:p-12 shadow-2xl border border-black/5 dark:border-white/10">
                <div class="mb-8" :class="isRtl ? 'text-right' : 'text-left'">
                    <h2 class="text-3xl font-black mb-2">Dive <span class="text-ocean-500">Manifest</span></h2>
                    <p class="text-sm opacity-50" x-text="`Target: ${selectedDive?.name}`"></p>
                </div>

                <div class="space-y-6">
                    <div :class="isRtl ? 'text-right' : 'text-left'">
                        <label class="block text-[10px] font-black uppercase tracking-widest opacity-40 mb-3 px-4">Calendar Date</label>
                        <input type="date" x-model="diveDate" 
                               class="w-full p-4 md:p-5 rounded-2xl bg-slate-100 dark:bg-white/5 border-none focus:ring-2 focus:ring-ocean-500 transition-all font-bold text-center">
                    </div>

                    <div :class="isRtl ? 'text-right' : 'text-left'">
                        <label class="block text-[10px] font-black uppercase tracking-widest opacity-40 mb-3 px-4">Party Size</label>
                        <div class="flex items-center justify-between p-2 rounded-2xl bg-slate-100 dark:bg-white/5">
                            <button @click="if(guests > 1) guests--" class="w-12 h-12 rounded-xl bg-white dark:bg-slate-800 font-black shadow-sm hover:bg-ocean-500 hover:text-white transition-all active:scale-90">-</button>
                            <span class="text-2xl font-black" x-text="guests"></span>
                            <button @click="guests++" class="w-12 h-12 rounded-xl bg-white dark:bg-slate-800 font-black shadow-sm hover:bg-ocean-500 hover:text-white transition-all active:scale-90">+</button>
                        </div>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3 pt-6" :class="isRtl ? 'flex-row-reverse' : ''">
                        <button @click="step = 1" class="w-full sm:flex-1 py-5 rounded-2xl border-2 border-black/5 dark:border-white/10 font-black uppercase text-xs tracking-widest hover:bg-black/5 dark:hover:bg-white/5 transition-all">Back</button>
                        <button @click="step = 3" :disabled="!diveDate" class="w-full sm:flex-[2] py-5 bg-ocean-500 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl shadow-ocean-500/30 disabled:opacity-20 transition-all">Review Final</button>
                    </div>
                </div>
            </div>
        </div>

        <div x-show="step === 3" x-transition class="max-w-xl mx-auto text-center">
            <div class="mb-10 flex flex-col items-center">
                <div class="w-20 h-20 rounded-full bg-green-500/10 text-green-500 flex items-center justify-center text-3xl mb-6 shadow-xl shadow-green-500/10">✓</div>
                <h2 class="text-4xl font-black mb-2 tracking-tight">Booking <span class="text-ocean-500">Summary</span></h2>
                <p class="opacity-50">Review your final dive manifest before entry.</p>
            </div>

            <div class="p-8 rounded-[3rem] bg-white dark:bg-slate-900 border-2 border-ocean-500/20 text-left space-y-4 mb-10 shadow-2xl"
                 :style="isRtl ? 'text-align: right;' : 'text-align: left;'">
                <div class="flex justify-between items-center py-2 border-b dark:border-white/5" :class="isRtl ? 'flex-row-reverse' : ''">
                    <span class="text-[10px] font-black uppercase opacity-40">Dive Site</span>
                    <span class="font-black text-ocean-500" x-text="selectedDive?.name"></span>
                </div>
                <div class="flex justify-between items-center py-2 border-b dark:border-white/5" :class="isRtl ? 'flex-row-reverse' : ''">
                    <span class="text-[10px] font-black uppercase opacity-40">Descent Date</span>
                    <span class="font-black" x-text="diveDate"></span>
                </div>
                <div class="flex justify-between items-center py-2" :class="isRtl ? 'flex-row-reverse' : ''">
                    <span class="text-[10px] font-black uppercase opacity-40">Total Amount</span>
                    <span class="text-2xl font-black" x-text="'$' + totalPrice"></span>
                </div>
            </div>

            <button @click="window.location.href='index.html'" class="w-full py-6 bg-ocean-500 text-white rounded-[2rem] font-black uppercase text-xs tracking-[0.2em] shadow-2xl shadow-ocean-500/40 hover:scale-[1.02] active:scale-95 transition-all">Confirm Descent</button>
        </div>
    </main>

    <div x-show="step === 2 && selectedDive" x-transition:enter="transition transform translate-y-20" x-transition:enter-end="translate-y-0"
         class="fixed bottom-0 w-full glass border-t border-black/5 dark:border-white/10 p-4 md:hidden z-[90] flex items-center justify-between"
         :class="isRtl ? 'flex-row-reverse' : ''">
        <div :class="isRtl ? 'text-right' : 'text-left'">
            <p class="text-[10px] font-black uppercase opacity-40">Total</p>
            <p class="text-xl font-black text-ocean-500" x-text="'$' + totalPrice"></p>
        </div>
        <button @click="step = 3" :disabled="!diveDate" class="px-8 py-3 bg-ocean-500 text-white rounded-xl font-black uppercase text-[10px] disabled:opacity-20 transition-all">Review</button>
    </div>

</body>
</html>
