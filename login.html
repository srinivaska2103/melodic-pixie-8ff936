<!DOCTYPE html>
<html lang="en" x-data="{ 
    darkMode: localStorage.getItem('theme') === 'dark', 
    isRtl: false, isLogin: true,
    toggleTheme() { this.darkMode = !this.darkMode; localStorage.setItem('theme', this.darkMode ? 'dark' : 'light'); },
    toggleDir() { this.isRtl = !this.isRtl; document.documentElement.dir = this.isRtl ? 'rtl' : 'ltr'; }
}" :class="{'dark': darkMode}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Assets/scuba.png">
    <title>Deep Dive | Auth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { ocean: { 500: '#0ea5e9' } } } } }
    </script>
</head>
<body class="transition-colors duration-500 min-h-screen flex items-center justify-center p-4" :class="darkMode ? 'bg-slate-950 text-white' : 'bg-slate-50 text-slate-900'">

    <div class="fixed top-4 right-4 flex gap-2" :class="isRtl ? 'right-auto left-4' : 'right-4'">
        <button @click="toggleDir()" class="p-2 border rounded-lg text-[10px] font-black uppercase tracking-widest opacity-60 hover:opacity-100 transition-all active:scale-90" :class="darkMode ? 'border-white/10' : 'border-black/10'" x-text="isRtl ? 'LTR' : 'RTL'"></button>
        <button @click="toggleTheme()" class="p-2 border rounded-lg opacity-60 hover:opacity-100 transition-all active:scale-90" :class="darkMode ? 'border-white/10' : 'border-black/10'"><span x-text="darkMode ? '☀️' : '🌙'"></span></button>
    </div>

    <div class="w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl transition-all" :class="darkMode ? 'bg-slate-900 border border-white/5 shadow-ocean-500/5' : 'bg-white shadow-slate-200'">

    <div class="w-10 h-10 bg-ocean-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-ocean-500/20 group-hover:rotate-12 transition-transform duration-300">

        DeepBlue
    </span>

</a>

        <div class="text-center mb-10 flex flex-col items-center">
    
    <a href="index.html" class="flex items-center justify-center gap-3 group transition-transform active:scale-95 shrink-0 mb-6">
        <div class="w-10 h-10 bg-ocean-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-ocean-500/20 group-hover:rotate-12 transition-transform duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
            </svg>
        </div>

       <span class="text-2xl lg:text-3xl font-black tracking-tighter text-blue-500/80 dark:text-blue-400/70 uppercase italic leading-none">
    DeepBlue
</span>
    </a>

    <div class="space-y-2">
        <h2 class="text-xl lg:text-2xl font-bold text-slate-800 dark:text-white opacity-90" 
            x-text="isLogin ? 'Welcome Back' : 'Create Account'">
        </h2>
        <p class="text-xs font-medium text-slate-500 dark:text-slate-400">
            <span x-text="isLogin ? 'New to the ocean?' : 'Already a diver?'"></span>
            <button @click="isLogin = !isLogin" 
                    class="text-ocean-500 font-black ml-1 uppercase text-[10px] tracking-widest hover:text-blue-600 transition-colors" 
                    x-text="isLogin ? 'Join Now' : 'Login'">
            </button>
        </p>
    </div>

</div>

        <form class="space-y-4" @submit.prevent="window.location.href='index.html'">
            <template x-if="!isLogin">
                <input type="text" placeholder="Full Name" required class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-white/5 outline-none border-2 border-transparent focus:border-ocean-500 transition-all font-bold text-sm">
            </template>
            
            <input type="email" placeholder="Email Address" required class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-white/5 outline-none border-2 border-transparent focus:border-ocean-500 transition-all font-bold text-sm">
            
            <div class="space-y-2">
                <input type="password" placeholder="Password" required class="w-full p-4 rounded-2xl bg-slate-100 dark:bg-white/5 outline-none border-2 border-transparent focus:border-ocean-500 transition-all font-bold text-sm">
                
                <div x-show="isLogin" class="text-right px-2">
                    <a href="#" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-ocean-500 transition-colors">Forgot Access?</a>
                </div>
            </div>
            
            <button class="w-full py-5 bg-ocean-500 text-white rounded-2xl font-black uppercase tracking-[0.2em] text-xs hover:brightness-110 shadow-lg shadow-ocean-500/20 active:scale-95 transition-all" :class="isLogin ? 'mt-6' : 'mt-2'">
                <span x-text="isLogin ? 'Login' : 'Begin Journey'"></span>
            </button>
        </form>

        <div class="mt-10">
            <div class="relative flex items-center mb-8">
                <div class="flex-grow border-t border-slate-200 dark:border-white/5"></div>
                <span class="flex-shrink mx-4 text-[9px] font-black uppercase tracking-[0.3em] opacity-30">Quick Link</span>
                <div class="flex-grow border-t border-slate-200 dark:border-white/5"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button class="flex items-center justify-center gap-3 py-4 rounded-2xl border-2 border-slate-100 dark:border-white/5 hover:bg-slate-50 dark:hover:bg-white/5 transition-all group active:scale-95">

                    <span class="text-[10px] font-black uppercase tracking-widest">Google</span>
                </button>
                <button class="flex items-center justify-center gap-3 py-4 rounded-2xl border-2 border-slate-100 dark:border-white/5 hover:bg-slate-50 dark:hover:bg-white/5 transition-all group active:scale-95">

                    <span class="text-[10px] font-black uppercase tracking-widest">Github</span>
                </button>
            </div>
        </div>
    </div>

    <p class="fixed bottom-6 text-[10px] font-black uppercase tracking-[0.4em] opacity-20">Secure Diving Terminal © 2026</p>
</body>
</html>
