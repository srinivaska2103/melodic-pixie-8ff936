<!DOCTYPE html>
<html lang="en" 
      x-data="{ 
        days: '00', hours: '00', mins: '00', secs: '00',
        darkMode: localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && true), 
        isRtl: localStorage.getItem('dir') === 'rtl', 
        emailSent: false,
        
        toggleTheme() {
            this.darkMode = !this.darkMode;
            localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
        },
        toggleDir() {
            this.isRtl = !this.isRtl;
            localStorage.setItem('dir', this.isRtl ? 'rtl' : 'ltr');
            document.documentElement.dir = this.isRtl ? 'rtl' : 'ltr';
        },
        init() {
            // Set direction on load
            document.documentElement.dir = this.isRtl ? 'rtl' : 'ltr';
            this.updateCountdown();
        },
        updateCountdown() {
            const launchDate = new Date('Dec 31, 2026 00:00:00').getTime();
            const timer = setInterval(() => {
                const now = new Date().getTime();
                const gap = launchDate - now;
                if (gap <= 0) {
                    clearInterval(timer);
                    window.location.href = 'index.html';
                    return;
                }
                this.days = Math.floor(gap / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                this.hours = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                this.mins = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                this.secs = Math.floor((gap % (1000 * 60)) / 1000).toString().padStart(2, '0');
            }, 1000);
        }
      }" 
      :class="{'dark': darkMode}"
      x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Assets/scuba.png">
    <title>Surfacing Soon | DeepBlue Scuba</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { ocean: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' } } 
                } 
            }
        }
    </script>
    
    <style>
        [x-cloak] { display: none !important; }
        @keyframes drift {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .float-animate { animation: drift 5s ease-in-out infinite; }
        
        @keyframes bubble {
            0% { transform: translateY(100vh); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }
        .bubble { position: absolute; background: currentColor; border-radius: 50%; pointer-events: none; animation: bubble linear infinite; bottom: -50px; }
    </style>
</head>

<body class="transition-colors duration-700 font-sans min-h-screen flex items-center justify-center p-6 relative overflow-x-hidden"
      :class="darkMode ? 'bg-slate-950 text-white' : 'bg-ocean-50 text-slate-900'">

    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="absolute inset-0 transition-opacity duration-1000"
             :class="darkMode ? 'bg-gradient-to-b from-ocean-900/20 to-slate-950' : 'bg-gradient-to-b from-ocean-100 to-ocean-50'"></div>
        
        <template x-for="i in 8">
            <div class="bubble" 
                 :class="darkMode ? 'text-white' : 'text-ocean-300'"
                 :style="`left: ${Math.random() * 100}%; width: ${10 + Math.random() * 20}px; height: ${10 + Math.random() * 20}px; animation-duration: ${6 + Math.random() * 8}s; animation-delay: ${Math.random() * 5}s;` ">
            </div>
        </template>
    </div>

    <div class="fixed top-6 right-6 z-50 flex gap-3" :class="isRtl ? 'right-auto left-6' : 'right-6'">
        <button @click="toggleDir()" class="p-3 rounded-2xl backdrop-blur-xl border border-black/10 dark:border-white/10 bg-white/20 dark:bg-slate-900/40 hover:scale-105 active:scale-95 transition-all">
            <span class="text-[10px] font-black uppercase tracking-widest" x-text="isRtl ? 'LTR' : 'RTL'"></span>
        </button>
        <button @click="toggleTheme()" class="p-3 rounded-2xl backdrop-blur-xl border border-black/10 dark:border-white/10 bg-white/20 dark:bg-slate-900/40 hover:scale-105 active:scale-95 transition-all">
            <span x-show="darkMode" x-cloak>☀️</span><span x-show="!darkMode" x-cloak>🌙</span>
        </button>
    </div>

    <main class="relative z-10 w-full max-w-5xl mx-auto py-12 flex flex-col items-center text-center">
        <div class="mb-8 float-animate">
            <span class="text-7xl md:text-9xl block drop-shadow-2xl">🐋</span>
        </div>

        <div class="space-y-6 mb-12">
            <h1 class="text-4xl sm:text-6xl md:text-8xl font-black tracking-tighter leading-none px-2">
                Something <span class="text-ocean-500">Deep</span> <br class="hidden sm:block"> is Surfacing.
            </h1>
            <p class="text-base sm:text-lg md:text-xl font-medium max-w-2xl mx-auto opacity-70 px-4 leading-relaxed">
                Site launching soon. You will be automatically redirected <br class="hidden md:block"> to the surface once the countdown ends.
            </p>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 w-full max-w-4xl px-2 mb-12">
            <template x-for="(val, label) in {Days: days, Hours: hours, Mins: mins, Secs: secs}">
                <div class="p-6 md:p-10 rounded-[2.5rem] bg-white/5 backdrop-blur-2xl border border-black/5 dark:border-white/10 shadow-2xl transition-all hover:border-ocean-500/50">
                    <span class="text-4xl md:text-6xl lg:text-7xl font-black text-ocean-500 block mb-2 tracking-tighter" x-text="val"></span>
                    <span class="text-[9px] md:text-[11px] font-black uppercase tracking-[0.3em] opacity-50" x-text="label"></span>
                </div>
            </template>
        </div>

        <div class="w-full max-w-md px-4">
            <div x-show="!emailSent" class="flex flex-col sm:flex-row gap-3">
                <input type="email" placeholder="Diver's Email" 
                       class="w-full px-6 py-5 rounded-2xl bg-white/10 dark:bg-white/5 border border-black/10 dark:border-white/10 outline-none focus:border-ocean-500 transition-all font-bold text-sm text-center">
                <button @click="emailSent = true" 
                        class="w-full sm:w-auto whitespace-nowrap px-8 py-5 bg-ocean-500 text-white rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-ocean-600 transition-all shadow-xl shadow-ocean-500/20 active:scale-95">
                    Signal Me
                </button>
            </div>
            
            <div x-show="emailSent" x-cloak x-transition.duration.500ms 
                 class="p-6 rounded-3xl bg-green-500/10 border border-green-500/30 text-green-500 font-black text-xs uppercase tracking-widest">
                🌊 Signal Received! Awaiting Ascent.
            </div>

            <div class="mt-8">
                <a href="index.html" class="text-xs font-black uppercase tracking-widest opacity-30 hover:opacity-100 transition-opacity">
                    Manual Surface →
                </a>
            </div>
        </div>
    </main>

    <h2 class="fixed bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 -z-10 select-none font-black text-[20vw] opacity-[0.03] tracking-tighter leading-none"
        :class="darkMode ? 'text-white' : 'text-ocean-900'">
        SOON
    </h2>

</body>
</html>
